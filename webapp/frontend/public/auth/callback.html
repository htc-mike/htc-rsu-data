<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Authentication Callback</title>
  <script>
    // Handle OAuth callback
    async function handleCallback() {
      try {
        // Get access token from URL hash
        const hashParams = new URLSearchParams(window.location.hash.substring(1))
        const accessToken = hashParams.get('access_token')
        const refreshToken = hashParams.get('refresh_token')

        console.log('Access token found:', !!accessToken)

        if (accessToken) {
          // Store tokens in localStorage for the React app to pick up
          localStorage.setItem('sb-access-token', accessToken)
          if (refreshToken) {
            localStorage.setItem('sb-refresh-token', refreshToken)
          }
        }

        // Redirect to main app after a short delay
        setTimeout(() => {
          window.location.href = '/htc-rsu-data/'
        }, 500)
      } catch (error) {
        console.error('Error handling callback:', error)
        // Redirect to main app even on error
        window.location.href = '/htc-rsu-data/'
      }
    }

    // Handle callback on load
    window.addEventListener('load', handleCallback)
  </script>
</head>
<body>
  <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0F172A; color: white; font-family: sans-serif;">
    <div>Signing in...</div>
  </div>
</body>
</html>
