name: Data Sync

on:
  schedule:
    # Run daily at 9:17 AM and 9:17 PM UTC (~5:17 AM and 5:17 PM EDT)
    # Off-peak times and odd minute avoid GitHub Actions scheduler congestion
    - cron: '17 9,21 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run data sync
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python rsu_htc_data.py
